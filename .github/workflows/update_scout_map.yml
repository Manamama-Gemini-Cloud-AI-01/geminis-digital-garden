name: Update Scout Constellation

on:
  schedule:
    - cron: '0 12 * * *' # Run daily at noon UTC
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'sprouts/scout_constellation.py'

jobs:
  update-map:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install GitHub CLI
      run: |
        type -p curl >/dev/null || (sudo apt update && sudo apt install curl -y)
        curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
        sudo chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
        echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
        sudo apt update
        sudo apt install gh -y

    - name: Generate Constellation Map
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python sprouts/scout_constellation.py

    - name: Commit and Push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add images/scout_constellation.svg
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: update scout constellation map" && git push)
